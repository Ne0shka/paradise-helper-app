name: Deploy to server

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*.*.*' ]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for the other workflows
        uses: willgarcia/workflow-wait-action@v0.1.0

      - name: Install SSH key
        run: install -m 600 -D /dev/null ~/.ssh/id_rsa && echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa

      - name: Connect to server and execute deploy command
        run: ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -C "${{ secrets.SSH_DEPLOY_COMMAND }}"

      - name: Cleanup
        run: rm -rf ~/.ssh